<!DOCTYPE html>
<html lang="zh">
{% block extra_head %}{% endblock %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}化学实验平台{% endblock %}</title>
    <!-- Bootstrap 5 CDN -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('home') }}">化学实验平台</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('home') }}">首页</a>
                    </li>
                    <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('add_experiment') }}">添加记录</a>
                    </li>
                    <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('records') }}">我的记录</a>
                    </li>
                    <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('experiments') }}">实验库</a>
                    </li>
                    <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('about') }}">关于</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            计算器
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="{{ url_for('molar_mass_calculator') }}">摩尔质量计算器</a></li>
                            <li><a class="dropdown-item" href="{{ url_for('solution_calculator') }}">溶液配制计算器</a></li>
                            <li><a class="dropdown-item" href="{{ url_for('unit_converter') }}">单位换算器</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主要内容区域 -->
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS（用于响应式菜单） -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
