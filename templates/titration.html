{% extends "base.html" %}

{% block title %}滴定模拟器 - 化学实验平台{% endblock %}

{% block content %}
<h1>🧪 酸碱滴定模拟器</h1>
<p>输入酸/碱参数，生成滴定曲线并查看计量点。</p>

<div class="row">
    <div class="col-md-4">
        <form id="titrationForm">
            <div class="mb-3">
                <label for="acid_conc" class="form-label">酸浓度 (mol/L)</label>
                <input type="number" step="0.01" class="form-control" id="acid_conc" name="acid_conc" value="0.1" required>
            </div>
            <div class="mb-3">
                <label for="acid_vol" class="form-label">酸体积 (mL)</label>
                <input type="number" step="1" class="form-control" id="acid_vol" name="acid_vol" value="20" required>
            </div>
            <div class="mb-3">
                <label for="base_conc" class="form-label">碱浓度 (mol/L)</label>
                <input type="number" step="0.01" class="form-control" id="base_conc" name="base_conc" value="0.1" required>
            </div>
            <button type="submit" class="btn btn-primary">计算并绘制曲线</button>
        </form>
        <div id="errorMsg" class="alert alert-danger mt-3" style="display:none;"></div>
    </div>
    <div class="col-md-8">
        <div id="chart" style="height: 400px;"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<!-- 使用可靠的 CDN -->
<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
<script>
    const form = document.getElementById('titrationForm');
    const errorDiv = document.getElementById('errorMsg');
    let chart = null;

    function initChart() {
        const dom = document.getElementById('chart');
        if (!dom) {
            console.error('chart容器不存在');
            return;
        }
        if (typeof echarts === 'undefined') {
            console.error('echarts 未加载，请检查网络');
            errorDiv.textContent = '图表库加载失败，请刷新页面重试';
            errorDiv.style.display = 'block';
            return;
        }
        chart = echarts.init(dom);
        chart.setOption({
            title: { text: '滴定曲线' },
            tooltip: { trigger: 'axis' },
            xAxis: { name: '滴定剂体积 (mL)', nameLocation: 'middle', nameGap: 30 },
            yAxis: { name: 'pH', nameLocation: 'middle', nameGap: 40 },
            series: [{ type: 'line', data: [], smooth: false, lineStyle: { color: '#5470c6' } }]
        });
        console.log('图表初始化完成');
    }

    function drawCurve(volumes, pH) {
        if (!chart) {
            console.error('图表未初始化');
            initChart();
            if (!chart) return;
        }
        const data = volumes.map((v, idx) => [v, pH[idx]]);
        chart.setOption({
            series: [{ data: data }],
            xAxis: { min: Math.min(...volumes), max: Math.max(...volumes) }
        });
        console.log('曲线绘制完成');
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorDiv.style.display = 'none';
        const data = {
            acid_conc: parseFloat(document.getElementById('acid_conc').value),
            acid_vol: parseFloat(document.getElementById('acid_vol').value),
            base_conc: parseFloat(document.getElementById('base_conc').value)
        };
        console.log('发送请求:', data);
        try {
            const response = await fetch('/api/titration', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if (response.ok) {
                console.log('收到数据:', result);
                drawCurve(result.volumes, result.pH);
            } else {
                errorDiv.textContent = result.error || '计算失败';
                errorDiv.style.display = 'block';
                console.error('后端错误:', result);
            }
        } catch (err) {
            errorDiv.textContent = '网络错误，请稍后重试';
            errorDiv.style.display = 'block';
            console.error('请求异常:', err);
        }
    });

    window.addEventListener('load', () => {
        initChart();
        // 自动请求默认数据
        fetch('/api/titration', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ acid_conc: 0.1, acid_vol: 20, base_conc: 0.1 })
        })
        .then(res => res.json())
        .then(result => {
            if (result.volumes) drawCurve(result.volumes, result.pH);
            else console.error('默认数据请求失败', result);
        })
        .catch(err => console.error('默认请求异常', err));
    });
</script>
{% endblock %}
