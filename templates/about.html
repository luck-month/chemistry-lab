{% extends "base.html" %}

{% block title %}关于 - 化学实验平台{% endblock %}

{% block content %}
    <h1>关于本平台</h1>
    <p>这是一个为化学专业同学设计的实验辅助平台，旨在通过数字化工具提升实验效率。</p>

    <ul>

        <li>化学计算器（摩尔质量、溶液配制、单位换算）</li>
        <li>滴定模拟器</li>
        <li>反应预测</li>
        <li>实验教学库</li>
        <li>报告模板一键导入</li>
    </ul>
{% endblock %}
